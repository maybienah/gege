<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Can We Have a Date soon?</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 100px;
      background-color: #ffe6e6;
      overflow: hidden;
    }

    h1 {
      font-size: 2.5em;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
    }

    #yesBtn {
      background-color: #4CAF50;
      color: white;
    }

    #noBtn {
      background-color: #f44336;
      color: white;
      position: absolute;
    }

    img {
      border-radius: 15px;
    }
  </style>
</head>

<body>

  <h1>Can we have a date soon? 💖</h1>

  <!-- GIF -->
  <img id="mainGif" src="cute.gif" width="300">

  <br><br>

  <button id="yesBtn" onclick="yesClicked()">Yes</button>
  <button id="noBtn" onmouseover="moveNo()">No</button>

  <p id="response"></p>

  <script>
    function yesClicked() {
      document.getElementById("response").innerHTML =
        "Yay! I’ll plan something special 😊";

      // change GIF to happy one
      document.getElementById("mainGif").src = "happy.gif";

      // optional: change background color
      document.body.style.backgroundColor = "#d4ffd4";

      // optional: hide buttons
      document.getElementById("yesBtn").style.display = "none";
      document.getElementById("noBtn").style.display = "none";
    }

    function moveNo() {
      const button = document.getElementById("noBtn");
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 100);
      button.style.left = x + "px";
      button.style.top = y + "px";
    }
  </script>

</body>
</html>
